version: "3.8"

services:

  backend:
    image: kanchanagarwal11/socketly-backend:latest
    container_name: socketly-backend
    ports:
    - "8080:8080"
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MONGO_URI: ${MONGO_URI}       # Use a .env file on the server
    restart: always
    networks:
      - socketly-network

  frontend:
    image: kanchanagarwal11/socketly-frontend:latest
    container_name: socketly-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
    - "5173:80"
    restart: always
    networks:
      - socketly-network

  nginx:
    image: nginx:latest
    container_name: socketly-nginx
    ports:
      - "8085:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - socketly-network

networks:
  socketly-network:
    driver: bridge