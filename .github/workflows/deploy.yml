name: Deploy Socketly

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 25
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'

    - name: Build Backend
      run: |
        cd backend
        mvn clean package -DskipTests

    - name: Login to DockerHub
      run: docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}

    - name: Build and Push Backend Image
      run: |
        docker build -t kanchan11/socketly-backend ./backend
        docker push kanchan11/socketly-backend

    - name: Build and Push Frontend Image
      run: |
        docker build -t kanchan11/socketly-frontend ./frontend
        docker push kanchan11/socketly-frontend

    - name: Deploy to Server
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_IP }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /apps/socketly
          docker compose pull
          docker compose up -d